<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Adoption — Oren</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    /* — Table (page-specific) — */
    .table-wrap {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }

    th {
      background: #13131f;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #52525b;
      padding: 0.7rem 1.25rem;
      text-align: left;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
      white-space: nowrap;
    }
    th:hover { color: #a1a1aa; }
    th.sorted { color: #fafafa; }
    .sort-indicator {
      display: inline-block;
      margin-left: 0.35rem;
      font-size: 0.55rem;
      opacity: 0;
      transition: opacity 0.15s;
      vertical-align: middle;
    }
    th.sorted .sort-indicator { opacity: 1; }

    td {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      vertical-align: top;
    }
    tr:hover td { background: rgba(255,255,255,0.015); }

    .user-name { font-weight: 500; color: #fafafa; font-size: 0.85rem; }
    .user-email { font-size: 0.7rem; color: #52525b; margin-top: 0.1rem; }
    .user-role {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      margin-top: 0.3rem;
    }
    .role-admin { background: rgba(43,122,75,0.15); color: #2B7A4B; }
    .role-member { background: rgba(74,144,217,0.1); color: #4A90D9; }
    .role-unknown { background: rgba(255,255,255,0.05); color: #52525b; }

    .metric-cost { font-weight: 600; color: #fafafa; font-size: 0.9rem; }
    .metric-tokens { font-size: 0.7rem; color: #52525b; margin-top: 0.15rem; }
    .metric-sessions { font-size: 0.7rem; color: #3d7abd; margin-top: 0.1rem; }
    .metric-zero .metric-cost { color: #3f3f46; font-weight: 400; }

    .metric-setup { font-weight: 600; font-size: 0.9rem; }
    .setup-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-top: 0.4rem;
      overflow: hidden;
    }
    .setup-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <script src="/shared/identity.js"></script>
  <script src="/shared/nav.js"></script>

  <div class="container">
    <div class="epigraph">
      <q>Sunlight is the best disinfectant</q>
    </div>

    <div class="header">
      <div>
        <h1>Claude Code Adoption</h1>
        <div class="meta" id="period"></div>
      </div>
      <button class="btn" id="refreshBtn" onclick="loadData()">Refresh</button>
    </div>

    <div class="summary" id="summary" style="display:none;grid-template-columns:repeat(4,1fr)">
      <div class="card">
        <div class="label">Team Members</div>
        <div class="value" id="totalUsers">&mdash;</div>
      </div>
      <div class="card">
        <div class="label">Today</div>
        <div class="value" id="totalDailyCost">&mdash;</div>
        <div class="detail" id="totalDailySessions"></div>
      </div>
      <div class="card">
        <div class="label">This Week</div>
        <div class="value" id="totalWeeklyCost">&mdash;</div>
        <div class="detail" id="totalWeeklySessions"></div>
      </div>
      <div class="card">
        <div class="label">Team Setup</div>
        <div class="value" id="avgSetup">&mdash;</div>
        <div class="detail" id="setupDetail"></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-key="name" class="sorted">User <span class="sort-indicator">&#9650;</span></th>
            <th data-key="daily">Daily Usage <span class="sort-indicator">&#9650;</span></th>
            <th data-key="weekly">Weekly Usage <span class="sort-indicator">&#9650;</span></th>
            <th data-key="setup">Setup <span class="sort-indicator">&#9650;</span></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="4"><div class="state-msg loading"><div class="spinner"></div><p>Loading usage data&hellip;</p></div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer" id="footer"></div>
  </div>

<script>
  var users = [];
  var checklistSummary = {};
  var sortKey = "name";
  var sortDir = 1;

  function fmtCost(n) {
    if (n === 0) return "$0.00";
    if (n < 0.01) return "<$0.01";
    return "$" + n.toFixed(2);
  }
  function fmtTokens(n) {
    if (n === 0) return "0 tokens";
    if (n < 1000) return n + " tokens";
    if (n < 1e6) return (n / 1000).toFixed(1) + "K tokens";
    return (n / 1e6).toFixed(2) + "M tokens";
  }
  function fmtSessions(n) {
    return n + " session" + (n !== 1 ? "s" : "");
  }

  function renderTable() {
    var sorted = users.slice().sort(function (a, b) {
      if (sortKey === "name") {
        var va = (a.name || a.email).toLowerCase();
        var vb = (b.name || b.email).toLowerCase();
        return sortDir * va.localeCompare(vb);
      }
      if (sortKey === "setup") {
        var sa = (checklistSummary[a.email] || { pct: 0 }).pct;
        var sb = (checklistSummary[b.email] || { pct: 0 }).pct;
        return sortDir * (sa - sb);
      }
      var ka = sortKey === "daily" ? a.daily.cost : a.weekly.cost;
      var kb = sortKey === "daily" ? b.daily.cost : b.weekly.cost;
      return sortDir * (ka - kb);
    });

    var tbody = document.getElementById("tbody");

    if (sorted.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4"><div class="state-msg empty"><p>No usage data yet. Data appears within 1 hour of the first Claude Code session.</p></div></td></tr>';
      return;
    }

    var html = "";
    for (var i = 0; i < sorted.length; i++) {
      var u = sorted[i];
      var roleClass = u.role === "admin" ? "role-admin" : u.role === "member" ? "role-member" : "role-unknown";
      var dZero = u.daily.cost === 0 && u.daily.sessions === 0 ? " metric-zero" : "";
      var wZero = u.weekly.cost === 0 && u.weekly.sessions === 0 ? " metric-zero" : "";
      var showEmail = u.name !== u.email;

      html += "<tr>"
        + "<td>"
          + '<div class="user-name">' + esc(u.name) + "</div>"
          + (showEmail ? '<div class="user-email">' + esc(u.email) + "</div>" : "")
          + '<span class="user-role ' + roleClass + '">' + esc(u.role) + "</span>"
        + "</td>"
        + '<td class="' + dZero.trim() + '">'
          + '<div class="metric-cost">' + fmtCost(u.daily.cost) + "</div>"
          + '<div class="metric-tokens">' + fmtTokens(u.daily.inputTokens + u.daily.outputTokens) + "</div>"
          + '<div class="metric-sessions">' + fmtSessions(u.daily.sessions) + "</div>"
        + "</td>"
        + '<td class="' + wZero.trim() + '">'
          + '<div class="metric-cost">' + fmtCost(u.weekly.cost) + "</div>"
          + '<div class="metric-tokens">' + fmtTokens(u.weekly.inputTokens + u.weekly.outputTokens) + "</div>"
          + '<div class="metric-sessions">' + fmtSessions(u.weekly.sessions) + "</div>"
        + "</td>";

      var si = checklistSummary[u.email] || { done: 0, total: 20, pct: 0 };
      var pctColor = si.pct === 100 ? "#2B7A4B" : si.pct >= 50 ? "#a1a1aa" : "#ef4444";
      var barColor = si.pct === 100 ? "#2B7A4B" : si.pct >= 50 ? "#4A90D9" : "#ef4444";

      html += '<td>'
          + '<div class="metric-setup" style="color:' + pctColor + '">' + si.pct + '%</div>'
          + '<div class="setup-bar"><div class="setup-bar-fill" style="width:' + si.pct + '%;background:' + barColor + '"></div></div>'
        + "</td>"
      + "</tr>";
    }
    tbody.innerHTML = html;

    document.getElementById("summary").style.display = "grid";
    document.getElementById("totalUsers").textContent = users.length;

    var dCost = 0, wCost = 0, dSess = 0, wSess = 0;
    for (var j = 0; j < users.length; j++) {
      dCost += users[j].daily.cost;
      wCost += users[j].weekly.cost;
      dSess += users[j].daily.sessions;
      wSess += users[j].weekly.sessions;
    }
    document.getElementById("totalDailyCost").textContent = fmtCost(dCost);
    document.getElementById("totalWeeklyCost").textContent = fmtCost(wCost);
    document.getElementById("totalDailySessions").textContent = fmtSessions(dSess);
    document.getElementById("totalWeeklySessions").textContent = fmtSessions(wSess);

    var totalPct = 0, setupCount = 0, doneCount = 0;
    for (var k = 0; k < users.length; k++) {
      var s = checklistSummary[users[k].email];
      if (s) { totalPct += s.pct; doneCount += s.done; }
      setupCount++;
    }
    var avgPct = setupCount > 0 ? Math.round(totalPct / setupCount) : 0;
    document.getElementById("avgSetup").textContent = avgPct + "%";
    document.getElementById("setupDetail").textContent = doneCount + " items across team";
  }

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  var ths = document.querySelectorAll("th[data-key]");
  for (var t = 0; t < ths.length; t++) {
    (function (th) {
      th.addEventListener("click", function () {
        var key = th.getAttribute("data-key");
        if (sortKey === key) { sortDir *= -1; }
        else { sortKey = key; sortDir = key === "name" ? 1 : -1; }

        for (var i = 0; i < ths.length; i++) {
          ths[i].classList.remove("sorted");
          ths[i].querySelector(".sort-indicator").innerHTML = "&#9650;";
        }
        th.classList.add("sorted");
        th.querySelector(".sort-indicator").innerHTML = sortDir === 1 ? "&#9650;" : "&#9660;";
        renderTable();
      });
    })(ths[t]);
  }

  function loadData() {
    var btn = document.getElementById("refreshBtn");
    btn.disabled = true;
    btn.textContent = "Loading\u2026";
    document.getElementById("tbody").innerHTML =
      '<tr><td colspan="4"><div class="state-msg loading"><div class="spinner"></div><p>Loading usage data&hellip;</p></div></td></tr>';

    Promise.all([
      fetch("/api/usage").then(function (r) {
        if (!r.ok) return r.json().then(function (b) { throw new Error(b.error || "HTTP " + r.status); });
        return r.json();
      }),
      fetch("/api/checklist-summary").then(function (r) {
        if (!r.ok) return { summary: {} };
        return r.json();
      })
    ])
      .then(function (results) {
        var data = results[0];
        checklistSummary = results[1].summary || {};
        users = data.users || [];
        document.getElementById("period").textContent =
          "Week of " + data.period.weeklyStart + " \u2014 " + data.period.weeklyEnd;
        document.getElementById("footer").textContent =
          "Last refreshed " + new Date(data.fetchedAt).toLocaleString();
        renderTable();
      })
      .catch(function (err) {
        document.getElementById("tbody").innerHTML =
          '<tr><td colspan="4"><div class="state-msg error"><p>' + esc(err.message) + "</p></div></td></tr>";
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = "Refresh";
      });
  }

  /* — Init: identity gate then load — */
  OrenIdentity.requireIdentity().then(function (user) {
    OrenNav.render(user);
    loadData();
  });
</script>
</body>
</html>
