<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polls — Oren Adoption</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .poll-card {
      background: #13131f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .poll-question {
      font-size: 1rem;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 1.5rem;
    }
    .poll-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .poll-option {
      background: #0f0f1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 0.8rem;
      color: #a1a1aa;
      font-family: inherit;
    }
    .poll-option:hover {
      border-color: rgba(255,255,255,0.15);
      color: #fafafa;
    }
    .poll-option.selected {
      border-color: #4A90D9;
      background: rgba(74,144,217,0.08);
      color: #4A90D9;
      font-weight: 500;
    }
    .poll-option.voted {
      cursor: default;
      opacity: 0.6;
    }
    .poll-option.voted.selected {
      opacity: 1;
    }
    .poll-status {
      font-size: 0.7rem;
      color: #52525b;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .poll-status .voted-label {
      color: #2B7A4B;
      font-weight: 500;
    }
    .chart-wrap {
      position: relative;
      height: 220px;
      margin-top: 0.5rem;
    }
    .poll-divider {
      height: 1px;
      background: rgba(255,255,255,0.04);
      margin: 1.25rem 0;
    }
    .no-polls {
      text-align: center;
      color: #3f3f46;
      padding: 4rem 1rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <script src="/shared/identity.js"></script>
  <script src="/shared/nav.js"></script>

  <div class="container">
    <div class="header">
      <div>
        <h1>Live Polls</h1>
        <div class="meta" id="pollMeta"></div>
      </div>
      <button class="btn" id="refreshBtn" onclick="loadPolls()">Refresh</button>
    </div>

    <div id="pollsContainer">
      <div class="state-msg loading"><div class="spinner"></div><p>Loading polls&hellip;</p></div>
    </div>
  </div>

<script>
  var currentUser = null;
  var charts = {};

  Chart.defaults.color = "#a1a1aa";
  Chart.defaults.borderColor = "rgba(255,255,255,0.04)";
  Chart.defaults.font.family = "'Inter', -apple-system, sans-serif";
  Chart.defaults.font.size = 12;

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function renderPoll(poll) {
    var hasVoted = poll.myVote !== null && poll.myVote !== undefined;
    var html = '<div class="poll-card" id="poll-' + poll.id + '">';
    html += '<div class="poll-question">' + esc(poll.question) + '</div>';

    html += '<div class="poll-options">';
    for (var i = 0; i < poll.options.length; i++) {
      var selected = hasVoted && poll.myVote === i ? " selected" : "";
      var voted = hasVoted ? " voted" : "";
      html += '<div class="poll-option' + selected + voted + '" data-poll="' + poll.id + '" data-idx="' + i + '">';
      html += esc(poll.options[i]);
      html += '</div>';
    }
    html += '</div>';

    html += '<div class="poll-status">';
    html += '<span>' + poll.totalVotes + ' vote' + (poll.totalVotes !== 1 ? 's' : '') + '</span>';
    if (hasVoted) {
      html += '<span class="voted-label">You voted: ' + esc(poll.options[poll.myVote]) + '</span>';
    } else {
      html += '<span>Click an option to vote</span>';
    }
    html += '</div>';

    html += '<div class="poll-divider"></div>';
    html += '<div class="chart-wrap"><canvas id="chart-' + poll.id + '"></canvas></div>';
    html += '</div>';
    return html;
  }

  function renderChart(poll) {
    var canvasId = "chart-" + poll.id;
    var canvas = document.getElementById(canvasId);
    if (!canvas) return;

    if (charts[poll.id]) {
      charts[poll.id].destroy();
    }

    var barColors = poll.options.map(function (_, i) {
      return poll.myVote === i ? "#4A90D9" : "rgba(74,144,217,0.3)";
    });

    charts[poll.id] = new Chart(canvas, {
      type: "bar",
      data: {
        labels: poll.options,
        datasets: [{
          data: poll.results,
          backgroundColor: barColors,
          borderRadius: 4,
          maxBarThickness: 64
        }]
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#13131f",
            titleColor: "#fafafa",
            bodyColor: "#a1a1aa",
            borderColor: "rgba(255,255,255,0.08)",
            borderWidth: 1,
            callbacks: {
              label: function (ctx) {
                var total = poll.totalVotes || 1;
                var pct = Math.round((ctx.raw / total) * 100);
                return ctx.raw + " vote" + (ctx.raw !== 1 ? "s" : "") + " (" + pct + "%)";
              }
            }
          }
        },
        scales: {
          x: {
            beginAtZero: true,
            ticks: { stepSize: 1, precision: 0 },
            grid: { color: "rgba(255,255,255,0.03)" }
          },
          y: {
            grid: { display: false }
          }
        }
      }
    });
  }

  function bindVoteClicks() {
    var options = document.querySelectorAll(".poll-option:not(.voted)");
    for (var i = 0; i < options.length; i++) {
      (function (opt) {
        opt.addEventListener("click", function () {
          var pollId = opt.getAttribute("data-poll");
          var idx = parseInt(opt.getAttribute("data-idx"), 10);
          submitVote(pollId, idx);
        });
      })(options[i]);
    }
  }

  function submitVote(pollId, optionIndex) {
    var allOpts = document.querySelectorAll('.poll-option[data-poll="' + pollId + '"]');
    for (var i = 0; i < allOpts.length; i++) {
      allOpts[i].classList.add("voted");
      allOpts[i].style.pointerEvents = "none";
    }

    fetch("/api/vote", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        pollId: parseInt(pollId, 10),
        userName: currentUser.name,
        userEmail: currentUser.email,
        optionIndex: optionIndex
      })
    })
    .then(function (r) {
      if (!r.ok) return r.json().then(function (b) { throw new Error(b.error); });
      return r.json();
    })
    .then(function () { loadPolls(); })
    .catch(function (err) { alert("Vote failed: " + err.message); loadPolls(); });
  }

  function loadPolls() {
    var btn = document.getElementById("refreshBtn");
    btn.disabled = true;
    btn.textContent = "Loading\u2026";

    var url = "/api/polls";
    if (currentUser) url += "?user=" + encodeURIComponent(currentUser.email);

    fetch(url)
      .then(function (r) {
        if (!r.ok) return r.json().then(function (b) { throw new Error(b.error); });
        return r.json();
      })
      .then(function (data) {
        var container = document.getElementById("pollsContainer");
        var polls = data.polls || [];

        if (polls.length === 0) {
          container.innerHTML = '<div class="no-polls">No active polls right now. Check back during the next session.</div>';
          return;
        }

        document.getElementById("pollMeta").textContent = polls.length + " active poll" + (polls.length !== 1 ? "s" : "");

        var html = "";
        for (var i = 0; i < polls.length; i++) {
          html += renderPoll(polls[i]);
        }
        container.innerHTML = html;

        for (var j = 0; j < polls.length; j++) {
          renderChart(polls[j]);
        }

        bindVoteClicks();
      })
      .catch(function (err) {
        document.getElementById("pollsContainer").innerHTML =
          '<div class="state-msg error"><p>' + esc(err.message) + '</p></div>';
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = "Refresh";
      });
  }

  /* — Init — */
  OrenIdentity.requireIdentity().then(function (user) {
    currentUser = user;
    OrenNav.render(user);
    loadPolls();
  });
</script>
</body>
</html>
