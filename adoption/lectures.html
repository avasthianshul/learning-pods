<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lectures — Oren Adoption</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a12;
      color: #a1a1aa;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* — Progress bar — */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: #4A90D9;
      transition: width 0.3s ease;
      z-index: 100;
    }

    /* — Navigation arrows — */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: transparent;
      border: none;
      color: #27272a;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-arrow:hover { color: #52525b; }
    .nav-arrow:disabled { opacity: 0; cursor: default; }
    .nav-left { left: 1rem; }
    .nav-right { right: 1rem; }

    /* — Back to picker — */
    .back-btn {
      position: fixed;
      top: 1rem;
      left: 1.25rem;
      background: transparent;
      border: none;
      color: #27272a;
      font-size: 0.7rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
      z-index: 50;
      letter-spacing: 0.04em;
    }
    .back-btn:hover { color: #52525b; }

    /* — Counter — */
    .screen-counter {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      font-size: 0.65rem;
      color: #27272a;
      font-variant-numeric: tabular-nums;
      z-index: 50;
    }

    /* — Screen container — */
    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 4rem;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .screen-inner {
      max-width: 780px;
      width: 100%;
    }

    /* — Lecture picker — */
    .picker {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .picker-inner {
      max-width: 480px;
      width: 100%;
    }
    .picker-title {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #3f3f46;
      margin-bottom: 2rem;
    }
    .picker-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 0;
      border-top: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: all 0.15s;
    }
    .picker-item:first-child { border-top: none; }
    .picker-item:hover .picker-label { color: #fafafa; }
    .picker-item.locked { opacity: 0.25; cursor: not-allowed; }
    .picker-item.locked:hover .picker-label { color: #52525b; }
    .picker-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1E2C56;
      min-width: 2rem;
    }
    .picker-item.locked .picker-num { color: #27272a; }
    .picker-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: #71717a;
      transition: color 0.15s;
    }
    .picker-lock {
      margin-left: auto;
      font-size: 0.7rem;
      color: #27272a;
    }
    .picker-admin {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .admin-unlock-btn {
      background: transparent;
      border: 1px solid rgba(43,122,75,0.2);
      color: #2B7A4B;
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .admin-unlock-btn:hover { background: rgba(43,122,75,0.08); }
    .admin-unlock-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===========================
       SCREEN TYPES
       =========================== */

    /* — Title — */
    .s-title { text-align: center; }
    .s-title h1 {
      font-size: 3rem;
      font-weight: 800;
      color: #fafafa;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .s-title .subtitle {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #3f3f46;
      margin-top: 1rem;
    }

    /* — Statement — */
    .s-statement { text-align: center; }
    .s-statement .main {
      font-size: 2.4rem;
      font-weight: 700;
      color: #fafafa;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    .s-statement .sub {
      font-size: 1rem;
      color: #52525b;
      margin-top: 1.25rem;
      line-height: 1.65;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    /* — Text — */
    .s-text h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fafafa;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    .s-text .body {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #71717a;
    }

    /* — Reveal — */
    .s-reveal { text-align: center; }
    .s-reveal .setup {
      font-size: 1rem;
      color: #3f3f46;
      line-height: 1.7;
      max-width: 600px;
      margin: 0 auto 2rem;
    }
    .s-reveal .punchline {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fafafa;
      line-height: 1.6;
      max-width: 640px;
      margin: 0 auto;
    }

    /* — Story (timeline) — */
    .s-story h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #52525b;
      margin-bottom: 2rem;
      text-align: center;
    }
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 480px;
      margin: 0 auto;
    }
    .timeline-step {
      display: flex;
      gap: 1.25rem;
      padding: 0.85rem 0;
      align-items: flex-start;
    }
    .timeline-dot-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      width: 12px;
    }
    .timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1E2C56;
      flex-shrink: 0;
    }
    .timeline-line {
      width: 2px;
      flex: 1;
      min-height: 20px;
      background: rgba(30,44,86,0.3);
    }
    .timeline-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fafafa;
    }
    .timeline-detail {
      font-size: 0.82rem;
      color: #52525b;
      margin-top: 0.15rem;
    }

    /* — Grid (cards) — */
    .s-grid h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #52525b;
      margin-bottom: 1.5rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.7rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .card-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
    }
    .card-item-title {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4A90D9;
      margin-bottom: 0.35rem;
    }
    .card-item-desc {
      font-size: 0.78rem;
      color: #52525b;
      line-height: 1.5;
    }

    /* — Interactive — */
    .s-interactive { text-align: center; }
    .s-interactive .int-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4A90D9;
      margin-bottom: 1.25rem;
    }
    .s-interactive .int-instruction {
      font-size: 0.95rem;
      color: #52525b;
      margin-bottom: 1.25rem;
    }
    .code-block {
      background: #0d0d18;
      border: 1px solid rgba(74,144,217,0.2);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      text-align: left;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 30px rgba(74,144,217,0.04);
    }
    .code-block code {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.88rem;
      color: #e4e4e7;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .code-copy {
      position: absolute;
      top: 0.65rem;
      right: 0.75rem;
      background: rgba(74,144,217,0.1);
      border: 1px solid rgba(74,144,217,0.2);
      color: #4A90D9;
      padding: 0.25rem 0.55rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .code-copy:hover { background: rgba(74,144,217,0.2); }
    .s-interactive .int-explanation {
      font-size: 0.82rem;
      color: #3f3f46;
      margin-top: 1.25rem;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    /* — Comparison — */
    .s-comparison h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #3f3f46;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .cmp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      overflow: hidden;
    }
    .cmp-col {
      padding: 1.5rem 1.75rem;
      background: #0a0a12;
    }
    .cmp-col:first-child { background: #0d0d16; }
    .cmp-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }
    .cmp-col:first-child .cmp-label { color: #52525b; }
    .cmp-col:last-child .cmp-label { color: #4A90D9; }
    .cmp-items { list-style: none; }
    .cmp-items li {
      font-size: 0.85rem;
      padding: 0.4rem 0;
      border-top: 1px solid rgba(255,255,255,0.03);
      line-height: 1.5;
    }
    .cmp-col:first-child .cmp-items li { color: #3f3f46; }
    .cmp-col:last-child .cmp-items li { color: #a1a1aa; }
    .cmp-items li:first-child { border-top: none; }

    /* — Question — */
    .s-question { text-align: center; }
    .s-question .q-text {
      font-size: 1.6rem;
      font-weight: 400;
      font-style: italic;
      color: #71717a;
      line-height: 1.5;
      max-width: 640px;
      margin: 0 auto;
      white-space: pre-line;
    }

    /* — Activity — */
    .s-activity { text-align: center; }
    .s-activity .act-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fafafa;
      margin-bottom: 1.5rem;
    }
    .act-steps {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-width: 480px;
      margin: 0 auto;
      text-align: left;
    }
    .act-step {
      display: flex;
      gap: 0.75rem;
      align-items: baseline;
      padding: 0.6rem 0;
    }
    .act-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: #1E2C56;
      min-width: 1.5rem;
    }
    .act-text {
      font-size: 0.9rem;
      color: #a1a1aa;
      line-height: 1.55;
    }

    /* — Recap — */
    .s-recap { text-align: center; }
    .s-recap .recap-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #3f3f46;
      margin-bottom: 1.5rem;
    }
    .recap-items {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 520px;
      margin: 0 auto 2rem;
      text-align: left;
    }
    .recap-item {
      font-size: 0.85rem;
      color: #52525b;
      padding: 0.35rem 0;
      padding-left: 1rem;
      border-left: 2px solid rgba(74,144,217,0.15);
      line-height: 1.5;
    }
    .s-recap .recap-next {
      font-size: 0.95rem;
      font-weight: 600;
      color: #4A90D9;
      margin-top: 1rem;
    }

    /* — Responsive — */
    @media (max-width: 640px) {
      .screen { padding: 2rem 1.5rem; }
      .s-title h1 { font-size: 2rem; }
      .s-statement .main { font-size: 1.6rem; }
      .cmp-grid { grid-template-columns: 1fr; }
      .card-grid { grid-template-columns: 1fr; }
      .nav-arrow { display: none; }
    }
  </style>
</head>
<body>
  <script src="/shared/identity.js"></script>
  <script src="/shared/nav.js"></script>

  <div id="app"></div>

<script>
  var currentUser = null;
  var lectures = [];
  var screens = [];
  var currentScreen = 0;
  var inLecture = false;
  var ADMIN_EMAILS = ["anshul@orennow.com"];

  function isAdmin() {
    return currentUser && ADMIN_EMAILS.indexOf(currentUser.email) !== -1;
  }

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }

  /* — Fetch lecture list — */
  function loadLectures() {
    fetch("/api/lectures")
      .then(function (r) { return r.ok ? r.json() : { lectures: [] }; })
      .then(function (data) {
        lectures = data.lectures || [];
        showPicker();
      })
      .catch(function () {
        lectures = [];
        showPicker();
      });
  }

  /* — Lecture picker — */
  function showPicker() {
    inLecture = false;
    document.body.style.overflow = "hidden";

    var html = '<div class="picker"><div class="picker-inner">';
    html += '<div class="picker-title">Lectures</div>';

    for (var i = 0; i < lectures.length; i++) {
      var lec = lectures[i];
      var cls = lec.unlocked ? "" : " locked";
      html += '<div class="picker-item' + cls + '" data-idx="' + i + '">';
      html += '<div class="picker-num">' + lec.sort_order + '</div>';
      html += '<div class="picker-label">' + esc(lec.title) + '</div>';
      if (!lec.unlocked) html += '<div class="picker-lock">&#128274;</div>';
      html += '</div>';
    }

    if (isAdmin()) {
      var nextLocked = null;
      for (var j = 0; j < lectures.length; j++) {
        if (!lectures[j].unlocked) { nextLocked = lectures[j]; break; }
      }
      if (nextLocked) {
        html += '<div class="picker-admin">';
        html += '<button class="admin-unlock-btn" id="unlockBtn">Unlock: ' + esc(nextLocked.title) + '</button>';
        html += '</div>';
      }
    }

    html += '</div></div>';
    document.getElementById("app").innerHTML = html;

    var items = document.querySelectorAll(".picker-item:not(.locked)");
    for (var k = 0; k < items.length; k++) {
      (function (el) {
        el.addEventListener("click", function () {
          var idx = parseInt(el.getAttribute("data-idx"), 10);
          enterLecture(lectures[idx]);
        });
      })(items[k]);
    }

    var unlockBtn = document.getElementById("unlockBtn");
    if (unlockBtn) {
      unlockBtn.addEventListener("click", function () {
        var secret = prompt("Admin secret:");
        if (!secret) return;
        unlockBtn.disabled = true;
        unlockBtn.textContent = "Saving\u2026";
        var nextLocked = null;
        for (var n = 0; n < lectures.length; n++) {
          if (!lectures[n].unlocked) { nextLocked = lectures[n]; break; }
        }
        fetch("/api/lectures", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + secret },
          body: JSON.stringify({ slug: nextLocked.slug, unlocked: true })
        }).then(function (r) {
          if (r.ok) { nextLocked.unlocked = true; showPicker(); }
          else { alert("Unauthorized"); unlockBtn.disabled = false; }
        });
      });
    }
  }

  /* — Enter lecture — */
  function enterLecture(lec) {
    document.getElementById("app").innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#27272a;font-size:0.8rem">Loading\u2026</div>';

    fetch("/lectures/" + lec.slug + ".json")
      .then(function (r) {
        if (!r.ok) throw new Error("Not found");
        return r.json();
      })
      .then(function (data) {
        screens = data.screens || [];
        currentScreen = 0;
        inLecture = true;
        renderScreen();
      })
      .catch(function () {
        document.getElementById("app").innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#52525b;font-size:0.85rem">Lecture file not found</div>';
      });
  }

  /* — Render current screen — */
  function renderScreen() {
    if (screens.length === 0) return;
    var s = screens[currentScreen];
    var pct = ((currentScreen + 1) / screens.length) * 100;

    var html = '<div class="progress-bar" style="width:' + pct + '%"></div>';
    html += '<button class="back-btn" id="backBtn">&#8592; ESC</button>';
    html += '<button class="nav-arrow nav-left" id="prevBtn"' + (currentScreen === 0 ? ' disabled' : '') + '>&#8592;</button>';
    html += '<button class="nav-arrow nav-right" id="nextBtn"' + (currentScreen === screens.length - 1 ? ' disabled' : '') + '>&#8594;</button>';
    html += '<div class="screen-counter">' + (currentScreen + 1) + ' / ' + screens.length + '</div>';
    html += '<div class="screen"><div class="screen-inner">';
    html += renderScreenContent(s);
    html += '</div></div>';

    document.getElementById("app").innerHTML = html;
    bindScreenNav();
  }

  function renderScreenContent(s) {
    switch (s.type) {
      case "title":
        return '<div class="s-title"><div class="subtitle">' + esc(s.subtitle) + '</div><h1>' + esc(s.heading) + '</h1></div>';

      case "statement":
        var sh = '<div class="s-statement"><div class="main">' + esc(s.text) + '</div>';
        if (s.sub) sh += '<div class="sub">' + esc(s.sub) + '</div>';
        return sh + '</div>';

      case "text":
        return '<div class="s-text"><h2>' + esc(s.heading) + '</h2><div class="body">' + esc(s.body) + '</div></div>';

      case "reveal":
        return '<div class="s-reveal"><div class="setup">' + esc(s.setup) + '</div><div class="punchline">' + esc(s.punchline) + '</div></div>';

      case "story":
        var st = '<div class="s-story">';
        if (s.heading) st += '<h2>' + esc(s.heading) + '</h2>';
        st += '<div class="timeline">';
        for (var i = 0; i < s.steps.length; i++) {
          st += '<div class="timeline-step">';
          st += '<div class="timeline-dot-wrap"><div class="timeline-dot"></div>' + (i < s.steps.length - 1 ? '<div class="timeline-line"></div>' : '') + '</div>';
          st += '<div><div class="timeline-label">' + esc(s.steps[i].label) + '</div><div class="timeline-detail">' + esc(s.steps[i].detail) + '</div></div>';
          st += '</div>';
        }
        return st + '</div></div>';

      case "grid":
        var g = '<div class="s-grid">';
        if (s.heading) g += '<h2>' + esc(s.heading) + '</h2>';
        g += '<div class="card-grid">';
        for (var j = 0; j < s.items.length; j++) {
          g += '<div class="card-item"><div class="card-item-title">' + esc(s.items[j].title) + '</div><div class="card-item-desc">' + esc(s.items[j].description) + '</div></div>';
        }
        return g + '</div></div>';

      case "interactive":
        var cmd = s.command || "";
        return '<div class="s-interactive">' +
          '<div class="int-title">' + esc(s.title) + '</div>' +
          '<div class="int-instruction">' + esc(s.instruction) + '</div>' +
          '<div class="code-block"><code>' + esc(cmd) + '</code><button class="code-copy" data-cmd="' + esc(cmd).replace(/"/g, '&quot;') + '">Copy</button></div>' +
          (s.explanation ? '<div class="int-explanation">' + esc(s.explanation) + '</div>' : '') +
          '</div>';

      case "comparison":
        var c = '<div class="s-comparison">';
        if (s.heading) c += '<h2>' + esc(s.heading) + '</h2>';
        c += '<div class="cmp-grid">';
        c += '<div class="cmp-col"><div class="cmp-label">' + esc(s.left.label) + '</div><ul class="cmp-items">';
        for (var cl = 0; cl < s.left.items.length; cl++) c += '<li>' + esc(s.left.items[cl]) + '</li>';
        c += '</ul></div>';
        c += '<div class="cmp-col"><div class="cmp-label">' + esc(s.right.label) + '</div><ul class="cmp-items">';
        for (var cr = 0; cr < s.right.items.length; cr++) c += '<li>' + esc(s.right.items[cr]) + '</li>';
        c += '</ul></div>';
        return c + '</div></div>';

      case "question":
        return '<div class="s-question"><div class="q-text">' + esc(s.text) + '</div></div>';

      case "activity":
        var a = '<div class="s-activity"><div class="act-title">' + esc(s.title) + '</div><div class="act-steps">';
        for (var ai = 0; ai < s.steps.length; ai++) {
          a += '<div class="act-step"><div class="act-num">' + (ai + 1) + '</div><div class="act-text">' + esc(s.steps[ai]) + '</div></div>';
        }
        return a + '</div></div>';

      case "recap":
        var r = '<div class="s-recap"><div class="recap-label">What we covered</div><div class="recap-items">';
        for (var ri = 0; ri < s.items.length; ri++) {
          r += '<div class="recap-item">' + esc(s.items[ri]) + '</div>';
        }
        r += '</div>';
        if (s.next) r += '<div class="recap-next">' + esc(s.next) + '</div>';
        return r + '</div>';

      default:
        return '<div class="s-text"><div class="body">' + esc(JSON.stringify(s)) + '</div></div>';
    }
  }

  /* — Navigation — */
  function bindScreenNav() {
    var prevBtn = document.getElementById("prevBtn");
    var nextBtn = document.getElementById("nextBtn");
    var backBtn = document.getElementById("backBtn");

    if (prevBtn) prevBtn.addEventListener("click", function () { go(-1); });
    if (nextBtn) nextBtn.addEventListener("click", function () { go(1); });
    if (backBtn) backBtn.addEventListener("click", function () { showPicker(); });

    var copyBtns = document.querySelectorAll(".code-copy");
    for (var i = 0; i < copyBtns.length; i++) {
      (function (btn) {
        btn.addEventListener("click", function () {
          var text = btn.getAttribute("data-cmd");
          navigator.clipboard.writeText(text).then(function () {
            btn.textContent = "Copied!";
            setTimeout(function () { btn.textContent = "Copy"; }, 1500);
          });
        });
      })(copyBtns[i]);
    }
  }

  function go(dir) {
    var next = currentScreen + dir;
    if (next < 0 || next >= screens.length) return;
    currentScreen = next;
    renderScreen();
  }

  document.addEventListener("keydown", function (e) {
    if (!inLecture) return;
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") { e.preventDefault(); go(1); }
    if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); go(-1); }
    if (e.key === "Escape") { showPicker(); }
  });

  /* — Touch swipe — */
  var touchStartX = 0;
  document.addEventListener("touchstart", function (e) { touchStartX = e.touches[0].clientX; });
  document.addEventListener("touchend", function (e) {
    if (!inLecture) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
  });

  /* — Init — */
  OrenIdentity.requireIdentity().then(function (user) {
    currentUser = user;
    OrenNav.render(user);
    loadLectures();
  });
</script>
</body>
</html>
