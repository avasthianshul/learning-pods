<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lectures — Oren Adoption</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .lectures-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2rem;
      min-height: 60vh;
    }

    /* — Sidebar — */
    .lecture-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .lecture-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .lecture-item:hover:not(.locked) {
      background: rgba(255,255,255,0.03);
    }
    .lecture-item.active {
      background: rgba(74,144,217,0.08);
      border-color: rgba(74,144,217,0.15);
    }
    .lecture-item.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .lecture-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: #52525b;
      flex-shrink: 0;
    }
    .lecture-item.active .lecture-num {
      background: #1E2C56;
      color: #fafafa;
    }
    .lecture-item.locked .lecture-num {
      font-size: 0.6rem;
    }
    .lecture-title {
      font-size: 0.75rem;
      color: #a1a1aa;
      font-weight: 500;
      line-height: 1.3;
    }
    .lecture-item.active .lecture-title { color: #fafafa; }
    .lecture-item.locked .lecture-title { color: #52525b; }

    /* — Stepper — */
    .stepper {
      background: #13131f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .stepper-content {
      flex: 1;
      padding: 2.5rem 3rem;
      overflow-y: auto;
    }
    .stepper-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: #11111b;
    }
    .stepper-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: #a1a1aa;
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .stepper-btn:hover:not(:disabled) {
      color: #fafafa;
      border-color: rgba(255,255,255,0.15);
    }
    .stepper-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }
    .stepper-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .stepper-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.2s;
      cursor: pointer;
    }
    .stepper-dot:hover { background: rgba(255,255,255,0.2); }
    .stepper-dot.active { background: #4A90D9; transform: scale(1.3); }
    .stepper-dot.visited { background: rgba(74,144,217,0.4); }
    .stepper-counter {
      font-size: 0.65rem;
      color: #52525b;
      margin-left: 0.75rem;
    }

    /* — Slide content typography — */
    .slide-content h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fafafa;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
      display: none;
    }
    .slide-content h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 1.25rem;
      letter-spacing: -0.01em;
    }
    .slide-content h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e4e4e7;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .slide-content p {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #a1a1aa;
      margin-bottom: 1rem;
    }
    .slide-content strong { color: #fafafa; font-weight: 600; }
    .slide-content em { color: #71717a; }
    .slide-content ul, .slide-content ol {
      margin-bottom: 1rem;
      padding-left: 1.25rem;
    }
    .slide-content li {
      font-size: 0.85rem;
      line-height: 1.65;
      color: #a1a1aa;
      margin-bottom: 0.35rem;
    }
    .slide-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.25rem;
      font-size: 0.8rem;
    }
    .slide-content th {
      background: rgba(255,255,255,0.03);
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-weight: 500;
      color: #a1a1aa;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.75rem;
    }
    .slide-content td {
      padding: 0.55rem 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #71717a;
    }
    .slide-content blockquote {
      border-left: 3px solid #1E2C56;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      background: rgba(30,44,86,0.08);
      border-radius: 0 6px 6px 0;
    }
    .slide-content blockquote p {
      color: #71717a;
      font-size: 0.85rem;
      margin-bottom: 0;
    }

    /* — Code blocks = "try it now" — */
    .slide-content pre {
      background: #0a0a14;
      border: 1px solid rgba(74,144,217,0.15);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      overflow-x: auto;
      position: relative;
    }
    .slide-content code {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.8rem;
      color: #4A90D9;
    }
    .slide-content pre code {
      line-height: 1.6;
      color: #e4e4e7;
    }
    .slide-content p code {
      background: rgba(74,144,217,0.1);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.78rem;
    }

    /* — Copy button on code blocks — */
    .code-copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #52525b;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }
    .code-copy-btn:hover { color: #fafafa; background: rgba(255,255,255,0.1); }

    /* — Empty/locked state — */
    .stepper-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: #3f3f46;
      font-size: 0.85rem;
    }

    /* — Admin controls — */
    .admin-bar {
      display: none;
      margin-bottom: 1rem;
      padding: 0.6rem 1rem;
      background: rgba(43,122,75,0.08);
      border: 1px solid rgba(43,122,75,0.15);
      border-radius: 8px;
      font-size: 0.7rem;
      color: #2B7A4B;
      align-items: center;
      gap: 0.5rem;
    }
    .admin-bar.visible { display: flex; }
    .admin-bar span { flex: 1; }
    .admin-toggle {
      background: #2B7A4B;
      color: #fafafa;
      border: none;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .admin-toggle:hover { background: #34915a; }

    @media (max-width: 700px) {
      .lectures-layout {
        grid-template-columns: 1fr;
      }
      .lecture-list {
        flex-direction: row;
        overflow-x: auto;
        gap: 4px;
      }
      .lecture-item { white-space: nowrap; }
      .stepper-content { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <script src="/shared/identity.js"></script>
  <script src="/shared/nav.js"></script>

  <div class="container">
    <div class="epigraph">
      <q>Sunlight is the best disinfectant</q>
    </div>

    <div class="header">
      <div>
        <h1>Lectures</h1>
        <div class="meta" id="lecturesMeta">Loading&hellip;</div>
      </div>
    </div>

    <div class="admin-bar" id="adminBar">
      <span id="adminLabel">Admin: toggle lecture visibility</span>
      <button class="admin-toggle" id="adminToggleBtn" onclick="toggleCurrentLecture()">Unlock Next</button>
    </div>

    <div id="mainContent">
      <div class="state-msg loading"><div class="spinner"></div><p>Loading lectures&hellip;</p></div>
    </div>
  </div>

<script>
  var currentUser = null;
  var lectures = [];
  var activeLecture = null;
  var slides = [];
  var currentSlide = 0;
  var maxVisited = 0;

  /* — Admin check (checks Anthropic org role from usage API or simple email check) — */
  var ADMIN_EMAILS = ["anshul@orennow.com"];

  function isAdmin() {
    return currentUser && ADMIN_EMAILS.indexOf(currentUser.email) !== -1;
  }

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  /* — Load lecture list from API — */
  function loadLectures() {
    fetch("/api/lectures")
      .then(function (r) {
        if (!r.ok) throw new Error("Failed to load lectures");
        return r.json();
      })
      .then(function (data) {
        lectures = data.lectures || [];
        renderLayout();

        var hash = window.location.hash.replace("#", "");
        var target = null;
        if (hash) {
          for (var i = 0; i < lectures.length; i++) {
            if (lectures[i].slug === hash && lectures[i].unlocked) {
              target = lectures[i];
              break;
            }
          }
        }
        if (!target) {
          for (var j = lectures.length - 1; j >= 0; j--) {
            if (lectures[j].unlocked) { target = lectures[j]; break; }
          }
        }
        if (target) selectLecture(target.slug);
      })
      .catch(function (err) {
        document.getElementById("mainContent").innerHTML =
          '<div class="state-msg error"><p>' + esc(err.message) + '</p></div>';
      });
  }

  /* — Render the two-column layout — */
  function renderLayout() {
    var unlockedCount = 0;
    for (var i = 0; i < lectures.length; i++) {
      if (lectures[i].unlocked) unlockedCount++;
    }
    document.getElementById("lecturesMeta").textContent =
      unlockedCount + " of " + lectures.length + " available";

    var html = '<div class="lectures-layout">';

    html += '<div class="lecture-list" id="lectureList">';
    for (var j = 0; j < lectures.length; j++) {
      var lec = lectures[j];
      var cls = lec.unlocked ? "" : " locked";
      if (activeLecture && activeLecture.slug === lec.slug) cls += " active";
      html += '<div class="lecture-item' + cls + '" data-slug="' + esc(lec.slug) + '">'
        + '<div class="lecture-num">' + (lec.unlocked ? lec.sort_order : '&#128274;') + '</div>'
        + '<div class="lecture-title">' + esc(lec.title) + '</div>'
        + '</div>';
    }
    html += '</div>';

    html += '<div class="stepper" id="stepper">';
    if (!activeLecture) {
      html += '<div class="stepper-empty">Select a lecture to begin</div>';
    }
    html += '</div>';

    html += '</div>';
    document.getElementById("mainContent").innerHTML = html;

    bindLectureClicks();
    updateAdminBar();
  }

  function bindLectureClicks() {
    var items = document.querySelectorAll(".lecture-item:not(.locked)");
    for (var i = 0; i < items.length; i++) {
      (function (el) {
        el.addEventListener("click", function () {
          selectLecture(el.getAttribute("data-slug"));
        });
      })(items[i]);
    }
  }

  /* — Select & load a lecture — */
  function selectLecture(slug) {
    for (var i = 0; i < lectures.length; i++) {
      if (lectures[i].slug === slug && lectures[i].unlocked) {
        activeLecture = lectures[i];
        break;
      }
    }
    if (!activeLecture) return;

    window.location.hash = slug;
    currentSlide = 0;
    maxVisited = 0;

    var items = document.querySelectorAll(".lecture-item");
    for (var j = 0; j < items.length; j++) {
      items[j].classList.remove("active");
      if (items[j].getAttribute("data-slug") === slug) {
        items[j].classList.add("active");
      }
    }

    var stepper = document.getElementById("stepper");
    stepper.innerHTML = '<div class="stepper-empty"><div class="spinner"></div></div>';

    fetch("/lectures/" + slug + ".md")
      .then(function (r) {
        if (!r.ok) throw new Error("Lecture file not found");
        return r.text();
      })
      .then(function (md) {
        slides = md.split(/\n---\n/).map(function (s) { return s.trim(); }).filter(function (s) { return s.length > 0; });
        if (slides.length > 0 && slides[0].match(/^# /)) {
          slides.shift();
        }
        renderStepper();
      })
      .catch(function (err) {
        stepper.innerHTML = '<div class="stepper-empty">' + esc(err.message) + '</div>';
      });
  }

  /* — Render stepper with current slide — */
  function renderStepper() {
    if (slides.length === 0) return;

    var stepper = document.getElementById("stepper");
    var slideHtml = marked.parse(slides[currentSlide]);

    var html = '<div class="stepper-content"><div class="slide-content">' + slideHtml + '</div></div>';

    html += '<div class="stepper-nav">';
    html += '<button class="stepper-btn" id="prevBtn"' + (currentSlide === 0 ? ' disabled' : '') + '>'
      + '&#8592; Back</button>';

    html += '<div style="display:flex;align-items:center">';
    html += '<div class="stepper-dots">';
    for (var i = 0; i < slides.length; i++) {
      var dotCls = "stepper-dot";
      if (i === currentSlide) dotCls += " active";
      else if (i <= maxVisited) dotCls += " visited";
      html += '<div class="' + dotCls + '" data-slide="' + i + '"></div>';
    }
    html += '</div>';
    html += '<span class="stepper-counter">' + (currentSlide + 1) + ' / ' + slides.length + '</span>';
    html += '</div>';

    html += '<button class="stepper-btn" id="nextBtn"' + (currentSlide === slides.length - 1 ? ' disabled' : '') + '>'
      + 'Next &#8594;</button>';
    html += '</div>';

    stepper.innerHTML = html;
    addCopyButtons();
    bindStepperNav();
  }

  /* — Add copy buttons to code blocks — */
  function addCopyButtons() {
    var pres = document.querySelectorAll(".slide-content pre");
    for (var i = 0; i < pres.length; i++) {
      (function (pre) {
        var btn = document.createElement("button");
        btn.className = "code-copy-btn";
        btn.textContent = "Copy";
        btn.addEventListener("click", function () {
          var code = pre.querySelector("code");
          if (code) {
            navigator.clipboard.writeText(code.textContent).then(function () {
              btn.textContent = "Copied!";
              setTimeout(function () { btn.textContent = "Copy"; }, 1500);
            });
          }
        });
        pre.style.position = "relative";
        pre.appendChild(btn);
      })(pres[i]);
    }
  }

  /* — Stepper navigation — */
  function bindStepperNav() {
    var prevBtn = document.getElementById("prevBtn");
    var nextBtn = document.getElementById("nextBtn");

    if (prevBtn) {
      prevBtn.addEventListener("click", function () {
        if (currentSlide > 0) {
          currentSlide--;
          renderStepper();
        }
      });
    }
    if (nextBtn) {
      nextBtn.addEventListener("click", function () {
        if (currentSlide < slides.length - 1) {
          currentSlide++;
          if (currentSlide > maxVisited) maxVisited = currentSlide;
          renderStepper();
        }
      });
    }

    var dots = document.querySelectorAll(".stepper-dot");
    for (var i = 0; i < dots.length; i++) {
      (function (dot) {
        dot.addEventListener("click", function () {
          var idx = parseInt(dot.getAttribute("data-slide"), 10);
          currentSlide = idx;
          if (currentSlide > maxVisited) maxVisited = currentSlide;
          renderStepper();
        });
      })(dots[i]);
    }
  }

  /* — Keyboard navigation — */
  document.addEventListener("keydown", function (e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
      if (currentSlide > 0) {
        currentSlide--;
        renderStepper();
      }
    }
    if (e.key === "ArrowRight" || e.key === "ArrowDown") {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        if (currentSlide > maxVisited) maxVisited = currentSlide;
        renderStepper();
      }
    }
  });

  /* — Admin: toggle unlock — */
  function updateAdminBar() {
    var bar = document.getElementById("adminBar");
    if (!isAdmin()) { bar.classList.remove("visible"); return; }
    bar.classList.add("visible");

    var nextLocked = null;
    for (var i = 0; i < lectures.length; i++) {
      if (!lectures[i].unlocked) { nextLocked = lectures[i]; break; }
    }

    var btn = document.getElementById("adminToggleBtn");
    var label = document.getElementById("adminLabel");

    if (nextLocked) {
      label.textContent = "Next locked: " + nextLocked.title;
      btn.textContent = "Unlock";
      btn.disabled = false;
    } else {
      label.textContent = "All lectures unlocked";
      btn.textContent = "All Open";
      btn.disabled = true;
    }
  }

  function toggleCurrentLecture() {
    var nextLocked = null;
    for (var i = 0; i < lectures.length; i++) {
      if (!lectures[i].unlocked) { nextLocked = lectures[i]; break; }
    }
    if (!nextLocked) return;

    var btn = document.getElementById("adminToggleBtn");
    btn.disabled = true;
    btn.textContent = "Saving\u2026";

    var secret = prompt("Enter admin secret:");
    if (!secret) { btn.disabled = false; updateAdminBar(); return; }

    fetch("/api/lectures", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + secret
      },
      body: JSON.stringify({ slug: nextLocked.slug, unlocked: true })
    })
      .then(function (r) {
        if (!r.ok) return r.json().then(function (b) { throw new Error(b.error); });
        nextLocked.unlocked = true;
        renderLayout();
        if (activeLecture) selectLecture(activeLecture.slug);
      })
      .catch(function (err) {
        alert("Error: " + err.message);
      })
      .finally(function () {
        btn.disabled = false;
        updateAdminBar();
      });
  }

  /* — Init — */
  OrenIdentity.requireIdentity().then(function (user) {
    currentUser = user;
    OrenNav.render(user);
    loadLectures();
  });
</script>
</body>
</html>
